<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion – ReRack</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-body">

  <div class="login-wrap">
    <a href="index.html" class="logo logo-center">
      <div class="logo-icon logo-icon-lg">♻</div>
      <span>ReRack</span>
    </a>

    <div class="login-card">
      <div class="login-head">
        <h1>Bienvenue !</h1>
        <p>Connectez-vous pour accéder à l'éditeur et créer vos meubles</p>
      </div>

      <form id="login-form" class="login-form">
        <label>
          Email
          <div class="input-wrap">
            <span class="input-icon">✉</span>
            <input type="email" id="login-email" placeholder="votre@email.com" required />
          </div>
        </label>
        <label>
          Mot de passe
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="login-password" placeholder="••••••••" required />
          </div>
        </label>

        <div id="login-error" class="login-error" style="display:none;"></div>

        <button type="submit" class="btn btn-primary w-full btn-lg">Se connecter</button>
      </form>

      <p class="login-hint">Pour cette démo, utilisez n'importe quel email et un mot de passe de 6+ caractères</p>
    </div>

    <a href="index.html" class="back-link">← Retour à l'accueil</a>
  </div>

  <script src="app.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');

      if (password.length < 6) {
        errorEl.textContent = 'Email ou mot de passe invalide. Le mot de passe doit contenir au moins 6 caractères.';
        errorEl.style.display = 'block';
        return;
      }

      const name = email.split('@')[0];
      localStorage.setItem('rerack-user', JSON.stringify({ email, name }));
      errorEl.style.display = 'none';
      window.location.href = 'editeur.html';
    });
  </script>
</body>
</html>
